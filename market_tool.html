<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Overview · PM Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="market_tool.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn" title="Back to toolkit">&#8592;</a>
      <div class="brand"><span class="brand-mark">&#9670;</span> Market Overview</div>
    </div>
    <div class="topbar-actions">
      <label class="theme-toggle" title="Toggle light / dark theme">
        <span class="t-icon">&#9790;</span>
        <input type="checkbox" id="themeToggle">
        <span class="toggle-pill"><span class="toggle-dot"></span></span>
        <span class="t-icon">&#9728;</span>
      </label>
    </div>
  </header>

  <div class="workspace">
    <aside class="panel">

      <div class="panel-section">
        <h2>Market</h2>
        <div class="field">
          <label>Market name</label>
          <input type="text" id="mktName" value="My Market" maxlength="60">
        </div>
      </div>

      <div class="panel-section">
        <h2>Market size (CHF B)</h2>
        <div class="field">
          <label>PAM &mdash; Potential Addressable Market</label>
          <input type="number" id="mktPam" value="200" min="0" step="0.1">
        </div>
        <div class="field">
          <label>TAM &mdash; Total Addressable Market</label>
          <input type="number" id="mktTam" value="50" min="0" step="0.1">
        </div>
        <div class="field">
          <label>SAM &mdash; Serviceable Addressable</label>
          <input type="number" id="mktSam" value="15" min="0" step="0.1">
        </div>
        <div class="field">
          <label>SOM &mdash; Serviceable Obtainable</label>
          <input type="number" id="mktSom" value="2" min="0" step="0.1">
        </div>
      </div>

      <div class="panel-section">
        <h2>Growth</h2>
        <div class="field">
          <label>Market CAGR (%)</label>
          <div class="slider-row">
            <input type="range" id="mktCagrSlider" min="0" max="50" step="0.5" value="12">
            <span class="slider-val" id="mktCagrVal">12%</span>
          </div>
        </div>
        <div class="field">
          <label>Start year</label>
          <input type="number" id="mktStartYear" value="2025" min="2000" max="2050" step="1">
        </div>
        <div class="field">
          <label>End year</label>
          <input type="number" id="mktEndYear" value="2030" min="2000" max="2060" step="1">
        </div>
      </div>

      <div class="panel-section">
        <h2>Competitors</h2>
        <div class="comp-form">
          <input type="text" id="compName" class="comp-name-input" placeholder="Competitor name" maxlength="40">
          <div class="comp-form-fields">
            <div class="field">
              <label>Share of SAM (%)</label>
              <input type="number" id="compShare" value="10" min="0" max="100" step="0.1">
            </div>
            <div class="field">
              <label>5 yr CAGR (%)</label>
              <input type="number" id="compCagr" value="10" min="-50" max="200" step="0.5">
            </div>
          </div>
          <button class="add-comp-btn" id="addCompBtn">+ Add competitor</button>
        </div>
        <div id="compList" class="comp-list"></div>
      </div>

    </aside>

    <main class="canvas">
      <div class="kpi-strip" id="kpiStrip"></div>

      <div class="market-charts">
        <div class="chart-block">
          <p class="section-title">PAM &#8594; TAM &#8594; SAM &#8594; SOM</p>
          <div id="funnelArea"></div>
        </div>
        <div class="chart-block">
          <p class="section-title">Market growth projection</p>
          <div id="growthArea"></div>
        </div>
      </div>

      <div class="comp-landscape" id="compLandscape">
        <div class="chart-block">
          <p class="section-title">Market share breakdown (% of SAM)</p>
          <div id="shareArea"></div>
        </div>
        <div class="chart-block">
          <p class="section-title">Competitor projections</p>
          <div id="compTableArea"></div>
        </div>
      </div>
    </main>
  </div>

</div>
<script>
  // ── Palette ──────────────────────────────────────────────────────
  var COMP_COLORS = ['#A78BFA','#FB7185','#F59E0B','#38BDF8','#34D399','#F97316','#EC4899','#A3E635'];

  // ── State ────────────────────────────────────────────────────────
  var state = { competitors: [] };

  // ── Helpers ──────────────────────────────────────────────────────
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function get(id) { return document.getElementById(id); }
  function val(id) { return +get(id).value || 0; }
  function pct(x)  { return (x * 100).toFixed(1) + '%'; }

  function fmtB(x) {
    if (x >= 1000) return 'CHF ' + (x / 1000).toFixed(1) + 'T';
    if (x >= 1)    return 'CHF ' + x.toFixed(1) + 'B';
    if (x > 0)     return 'CHF ' + (x * 1000).toFixed(0) + 'M';
    return 'CHF 0';
  }

  function fmtShort(x) {
    if (x >= 1000) return (x / 1000).toFixed(1) + 'T';
    if (x >= 1)    return x.toFixed(1) + 'B';
    return (x * 1000).toFixed(0) + 'M';
  }

  // ── Save / load ──────────────────────────────────────────────────
  function save() {
    var d = {
      mktName:      get('mktName').value,
      mktPam:       get('mktPam').value,
      mktTam:       get('mktTam').value,
      mktSam:       get('mktSam').value,
      mktSom:       get('mktSom').value,
      cagr:         get('mktCagrSlider').value,
      mktStartYear: get('mktStartYear').value,
      mktEndYear:   get('mktEndYear').value,
      competitors:  state.competitors
    };
    localStorage.setItem('market-v2', JSON.stringify(d));
  }

  function load() {
    var raw = localStorage.getItem('market-v2');
    if (!raw) {
      // Migrate from market-v1
      var old = localStorage.getItem('market-v1');
      if (old) {
        try {
          var o = JSON.parse(old);
          if (o.mktTam)       get('mktTam').value       = o.mktTam;
          if (o.mktSam)       get('mktSam').value       = o.mktSam;
          if (o.mktSom)       get('mktSom').value       = o.mktSom;
          if (o.cagr)         get('mktCagrSlider').value = o.cagr;
          if (o.mktStartYear) get('mktStartYear').value = o.mktStartYear;
          if (o.mktEndYear)   get('mktEndYear').value   = o.mktEndYear;
          if (o.mktName)      get('mktName').value      = o.mktName;
          // Default PAM to 4x TAM
          if (o.mktTam) get('mktPam').value = (+o.mktTam * 4).toFixed(1);
        } catch(e) {}
      }
      return;
    }
    try {
      var p = JSON.parse(raw);
      var fields = ['mktName','mktPam','mktTam','mktSam','mktSom','mktStartYear','mktEndYear'];
      fields.forEach(function(k) { if (p[k] !== undefined) get(k).value = p[k]; });
      if (p.cagr !== undefined) get('mktCagrSlider').value = p.cagr;
      if (Array.isArray(p.competitors)) state.competitors = p.competitors;
    } catch(e) {}
  }

  // ── KPI helper ───────────────────────────────────────────────────
  function kpi(v, l) {
    return '<div class="kpi-card"><div class="kpi-value">' + v + '</div><div class="kpi-label">' + l + '</div></div>';
  }

  // ── Main render ──────────────────────────────────────────────────
  function render() {
    var pam  = val('mktPam');
    var tam  = val('mktTam');
    var sam  = val('mktSam');
    var som  = val('mktSom');
    var cagr = val('mktCagrSlider');
    var sy   = Math.round(val('mktStartYear'));
    var ey   = Math.round(val('mktEndYear'));
    if (ey <= sy) ey = sy + 1;

    get('mktCagrVal').textContent = cagr + '%';

    var years   = ey - sy;
    var tamEnd  = tam * Math.pow(1 + cagr / 100, years);
    var tamPct  = pam > 0 ? pct(tam / pam) : '—';
    var samPct  = tam > 0 ? pct(sam / tam) : '—';
    var somPct  = sam > 0 ? pct(som / sam) : '—';

    get('kpiStrip').innerHTML =
      kpi(fmtB(pam),       'PAM') +
      kpi(fmtB(tam),       'TAM (' + tamPct + ' of PAM)') +
      kpi(fmtB(sam),       'SAM (' + samPct + ' of TAM)') +
      kpi(fmtB(som),       'SOM (' + somPct + ' of SAM)') +
      kpi(cagr + '%',      'Market CAGR') +
      kpi(fmtB(tamEnd),    'TAM in ' + ey);

    renderFunnel(pam, tam, sam, som);
    renderGrowth(tam, sam, som, cagr, sy, ey);
    renderCompetitors(sam, sy, ey);
  }

  // ── Funnel ───────────────────────────────────────────────────────
  function renderFunnel(pam, tam, sam, som) {
    if (pam <= 0 && tam <= 0) {
      get('funnelArea').innerHTML = '<p class="empty-state">Enter PAM or TAM to see the funnel.</p>';
      return;
    }
    var base = pam > 0 ? pam : tam;
    var rows = [
      { label:'PAM', value:pam, pct:1,                              color:'var(--slate)', tc:'var(--slate)' },
      { label:'TAM', value:tam, pct: base > 0 ? tam/base : 0,      color:'var(--teal)',  tc:'var(--teal)'  },
      { label:'SAM', value:sam, pct: base > 0 ? sam/base : 0,      color:'var(--amber)', tc:'var(--amber)' },
      { label:'SOM', value:som, pct: base > 0 ? som/base : 0,      color:'var(--coral)', tc:'var(--coral)' }
    ];
    var W = 480, PL = 48, BAR_W = W - PL - 130, ROW_H = 52, H = rows.length * ROW_H + 20;
    var svg = '<svg class="funnel-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
    rows.forEach(function(r, i) {
      var y  = 10 + i * ROW_H;
      var bw = Math.max(r.pct * BAR_W, r.value > 0 ? 4 : 0);
      var my = y + ROW_H / 2;
      svg += '<text x="' + (PL - 8) + '" y="' + (my + 5) + '" text-anchor="end" font-family="Space Grotesk,sans-serif" font-size="12" font-weight="700" style="fill:' + r.tc + '">' + r.label + '</text>';
      if (bw > 0) {
        svg += '<rect x="' + PL + '" y="' + (my - 14) + '" width="' + bw.toFixed(1) + '" height="28" rx="4" style="fill:' + r.color + '" fill-opacity="0.55"/>';
      }
      svg += '<text x="' + (PL + bw + 10) + '" y="' + (my + 4) + '" font-family="IBM Plex Mono,monospace" font-size="12" font-weight="600" style="fill:' + r.tc + '">' + fmtB(r.value) + '</text>';
      if (i > 0 && base > 0) {
        svg += '<text x="' + (W - 8) + '" y="' + (my + 4) + '" text-anchor="end" font-family="IBM Plex Mono,monospace" font-size="10" style="fill:var(--ink-soft)">' + pct(r.pct) + '</text>';
      }
    });
    svg += '</svg>';
    get('funnelArea').innerHTML = svg;
  }

  // ── Growth chart ─────────────────────────────────────────────────
  function renderGrowth(tam, sam, som, cagr, sy, ey) {
    var years = [];
    for (var y = sy; y <= ey; y++) years.push(y);
    if (years.length < 2) return;

    var comp = state.competitors;
    var tamS = years.map(function(y) { return tam * Math.pow(1 + cagr/100, y - sy); });
    var samS = years.map(function(y) { return sam * Math.pow(1 + cagr/100, y - sy); });
    var somS = years.map(function(y) { return som * Math.pow(1 + cagr/100, y - sy); });

    // Competitor series: absolute size = SAM_now * share/100 growing at comp CAGR
    var compSeries = comp.map(function(c) {
      var base = sam * (c.share / 100);
      return years.map(function(y) { return base * Math.pow(1 + c.cagr/100, y - sy); });
    });

    var allV = tamS.concat(samS).concat(somS);
    compSeries.forEach(function(s) { allV = allV.concat(s); });
    var maxV = Math.max.apply(null, allV) * 1.1;
    if (maxV <= 0) return;

    var W = 480, PX = 50, PW = 390, PY = 14, PH = 200, H = 260 + (comp.length > 0 ? 20 : 0);

    function sx(i) { return PX + (i / (years.length - 1)) * PW; }
    function sy2(v) { return PY + PH - (v / maxV) * PH; }
    function pathD(data) {
      return 'M ' + data.map(function(v, i) { return sx(i).toFixed(1) + ',' + sy2(v).toFixed(1); }).join(' L ');
    }
    function fillD(data) {
      return pathD(data) + ' L ' + sx(data.length-1).toFixed(1) + ',' + (PY+PH) + ' L ' + PX + ',' + (PY+PH) + ' Z';
    }

    var xLabels = years.map(function(yr, i) {
      var x = sx(i).toFixed(1);
      return '<line x1="' + x + '" y1="' + (PY+PH) + '" x2="' + x + '" y2="' + (PY+PH+4) + '" style="stroke:var(--border-bright)" stroke-width="1"/>' +
             '<text x="' + x + '" y="' + (PY+PH+16) + '" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" style="fill:var(--ink-soft)">' + yr + '</text>';
    }).join('');

    // Y-axis labels
    var steps = [0.25, 0.5, 0.75].map(function(f) { var v = maxV * f; return v; });
    var yLabels = steps.map(function(v) {
      var y2 = sy2(v).toFixed(1);
      return '<line x1="' + PX + '" y1="' + y2 + '" x2="' + (PX+PW) + '" y2="' + y2 + '" style="stroke:var(--border)" stroke-width="0.5" stroke-dasharray="3 3"/>' +
             '<text x="' + (PX-4) + '" y="' + (+y2+3) + '" text-anchor="end" font-family="IBM Plex Mono,monospace" font-size="9" style="fill:var(--ink-soft)">' + fmtShort(v) + '</text>';
    }).join('');

    // Competitor lines
    var compLines = compSeries.map(function(s, ci) {
      var color = COMP_COLORS[ci % COMP_COLORS.length];
      return '<path d="' + pathD(s) + '" style="stroke:' + color + '" fill="none" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round"/>';
    }).join('');

    // Competitor labels at end of line
    var compEndLabels = compSeries.map(function(s, ci) {
      var color = COMP_COLORS[ci % COMP_COLORS.length];
      var ex = sx(s.length - 1).toFixed(1);
      var ey2 = sy2(s[s.length - 1]);
      return '<text x="' + (+ex - 4) + '" y="' + (ey2 - 5).toFixed(1) + '" text-anchor="end" font-family="Inter,sans-serif" font-size="9" style="fill:' + color + '">' + esc(comp[ci].name) + '</text>';
    }).join('');

    var svg = '<svg class="growth-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
      yLabels +
      '<path d="' + fillD(tamS) + '" style="fill:var(--teal)"  fill-opacity="0.04"/>' +
      '<path d="' + fillD(samS) + '" style="fill:var(--amber)" fill-opacity="0.07"/>' +
      '<path d="' + fillD(somS) + '" style="fill:var(--coral)" fill-opacity="0.1"/>' +
      compLines +
      '<path d="' + pathD(tamS) + '" style="stroke:var(--teal)"  fill="none" stroke-width="2" stroke-linecap="round"/>' +
      '<path d="' + pathD(samS) + '" style="stroke:var(--amber)" fill="none" stroke-width="2" stroke-linecap="round"/>' +
      '<path d="' + pathD(somS) + '" style="stroke:var(--coral)" fill="none" stroke-width="2" stroke-linecap="round"/>' +
      compEndLabels +
      '<line x1="' + PX + '" y1="' + (PY+PH) + '" x2="' + (PX+PW) + '" y2="' + (PY+PH) + '" style="stroke:var(--border-bright)" stroke-width="1"/>' +
      xLabels +
      '<text x="' + (PX+PW-4) + '" y="' + (sy2(tamS[tamS.length-1]) - 6) + '" text-anchor="end" font-family="Inter,sans-serif" font-size="10" style="fill:var(--teal)">TAM</text>' +
      '<text x="' + (PX+PW-4) + '" y="' + (sy2(samS[samS.length-1]) - 6) + '" text-anchor="end" font-family="Inter,sans-serif" font-size="10" style="fill:var(--amber)">SAM</text>' +
      '<text x="' + (PX+PW-4) + '" y="' + (sy2(somS[somS.length-1]) - 6) + '" text-anchor="end" font-family="Inter,sans-serif" font-size="10" style="fill:var(--coral)">SOM</text>' +
      '</svg>';

    get('growthArea').innerHTML = svg;
  }

  // ── Competitor rendering ─────────────────────────────────────────
  function renderCompetitors(sam, sy, ey) {
    var comp = state.competitors;
    var el = get('compLandscape');
    if (comp.length === 0) { el.style.display = 'none'; return; }
    el.style.display = '';

    renderShareChart(sam, comp);
    renderCompTable(sam, comp, sy, ey);
  }

  function renderShareChart(sam, comp) {
    if (!comp.length) return;
    var totalShare = comp.reduce(function(s, c) { return s + c.share; }, 0);
    var others = Math.max(0, 100 - totalShare);
    var rows = comp.map(function(c, i) {
      return { label: c.name, share: c.share, color: COMP_COLORS[i % COMP_COLORS.length] };
    });
    if (others > 0.05) rows.push({ label: 'Others', share: others, color: 'var(--slate)' });

    var W = 480, PL = 110, BAR_W = 260, ROW_H = 34, H = rows.length * ROW_H + 16;
    var svg = '<svg class="funnel-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
    rows.forEach(function(r, i) {
      var y  = 8 + i * ROW_H;
      var bw = (r.share / 100) * BAR_W;
      var my = y + ROW_H / 2;
      svg += '<text x="' + (PL - 8) + '" y="' + (my + 4) + '" text-anchor="end" font-family="Inter,sans-serif" font-size="11" style="fill:var(--ink)" dominant-baseline="middle">' + esc(r.label) + '</text>';
      if (bw > 0) {
        svg += '<rect x="' + PL + '" y="' + (my - 11) + '" width="' + bw.toFixed(1) + '" height="22" rx="3" style="fill:' + r.color + '" fill-opacity="0.65"/>';
      }
      svg += '<text x="' + (PL + bw + 8) + '" y="' + (my + 4) + '" font-family="IBM Plex Mono,monospace" font-size="11" font-weight="600" style="fill:' + r.color + '">' + r.share.toFixed(1) + '%</text>';
      if (sam > 0) {
        var abs = sam * r.share / 100;
        svg += '<text x="' + (PL + BAR_W + 70) + '" y="' + (my + 4) + '" font-family="IBM Plex Mono,monospace" font-size="10" style="fill:var(--ink-soft)">' + fmtB(abs) + '</text>';
      }
    });
    svg += '</svg>';
    get('shareArea').innerHTML = svg;
  }

  function renderCompTable(sam, comp, sy, ey) {
    var years = ey - sy;
    var rows = comp.map(function(c, i) {
      var color   = COMP_COLORS[i % COMP_COLORS.length];
      var curAbs  = sam * c.share / 100;
      var projAbs = curAbs * Math.pow(1 + c.cagr / 100, years);
      var arrow   = c.cagr > 0 ? '&#8599;' : c.cagr < 0 ? '&#8600;' : '&#8594;';
      return '<tr>' +
        '<td><span class="comp-dot-inline" style="background:' + color + '"></span>' + esc(c.name) + '</td>' +
        '<td class="num">' + c.share.toFixed(1) + '%</td>' +
        '<td class="num">' + fmtB(curAbs) + '</td>' +
        '<td class="num" style="color:' + (c.cagr >= 0 ? 'var(--teal)' : 'var(--coral)') + '">' + arrow + ' ' + c.cagr.toFixed(1) + '%</td>' +
        '<td class="num">' + fmtB(projAbs) + '</td>' +
      '</tr>';
    }).join('');

    get('compTableArea').innerHTML =
      '<table class="comp-table">' +
      '<thead><tr><th>Competitor</th><th>Share</th><th>Now (CHF)</th><th>CAGR</th><th>In ' + ey + ' (CHF)</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table>';
  }

  // ── Competitor CRUD ──────────────────────────────────────────────
  function addCompetitor() {
    var name  = get('compName').value.trim();
    var share = +get('compShare').value;
    var cagr  = +get('compCagr').value;
    if (!name) { get('compName').focus(); return; }
    state.competitors.push({ id: uid(), name: name, share: share, cagr: cagr });
    get('compName').value = '';
    save();
    renderCompList();
    render();
  }

  function deleteCompetitor(id) {
    state.competitors = state.competitors.filter(function(c) { return c.id !== id; });
    save();
    renderCompList();
    render();
  }

  function renderCompList() {
    var comp = state.competitors;
    if (!comp.length) { get('compList').innerHTML = ''; return; }
    get('compList').innerHTML = comp.map(function(c, i) {
      var color = COMP_COLORS[i % COMP_COLORS.length];
      return '<div class="comp-item">' +
        '<span class="comp-dot" style="background:' + color + '"></span>' +
        '<div class="comp-details">' +
          '<span class="comp-name">' + esc(c.name) + '</span>' +
          '<span class="comp-stat">' + c.share.toFixed(1) + '% share &middot; ' + (c.cagr >= 0 ? '+' : '') + c.cagr.toFixed(1) + '% CAGR</span>' +
        '</div>' +
        '<button class="comp-del" onclick="deleteCompetitor(\'' + c.id + '\')">&#215;</button>' +
      '</div>';
    }).join('');
  }

  // ── Event wiring ─────────────────────────────────────────────────
  get('addCompBtn').addEventListener('click', addCompetitor);
  get('compName').addEventListener('keydown', function(e) { if (e.key === 'Enter') addCompetitor(); });

  document.querySelectorAll('.panel input:not(#compName):not(#compShare):not(#compCagr), .panel select').forEach(function(el) {
    el.addEventListener('input', function() { save(); render(); });
  });

  // Theme
  function applyTheme(isLight) {
    document.documentElement.classList.toggle('light', isLight);
  }
  var tt = get('themeToggle');
  var saved = localStorage.getItem('prio-theme');
  if (saved === 'light') { tt.checked = true; applyTheme(true); }
  tt.addEventListener('change', function() {
    applyTheme(this.checked);
    localStorage.setItem('prio-theme', this.checked ? 'light' : 'dark');
  });

  load();
  renderCompList();
