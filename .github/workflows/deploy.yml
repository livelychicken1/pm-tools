name: CI / Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '.htmlhintrc'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '.htmlhintrc'
      - '.github/workflows/deploy.yml'

# Allow one deploy at a time; let an in-progress deploy finish before starting another
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── CI: validate HTML ───────────────────────────────────────────────
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: htmlhint "*.html"

  # ── CD: deploy to GitHub Pages (main branch only) ───────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
